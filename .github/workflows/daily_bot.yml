name: Daily Tennis Predictor Bot

on:
  schedule:
    # Fires the cloud server exactly at 12:10 AM GMT / Ghana Time every single night
    - cron: '10 0 * * *' 
  workflow_dispatch: # Keeps the manual play button active in your browser dashboard

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup Cloud Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn joblib requests beautifulsoup4 twilio

    - name: Re-Run Pipeline Data Training
      run: python src/train.py

    - name: Execute Daily Scraper & WhatsApp Notification
      run: python src/predict.py
      env:
        TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
        TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
